name: Frontend Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      pr_number:
        description: Active frontend pull request number
        required: true
        type: string
      pr_head_sha:
        description: Active frontend pull request head SHA
        required: true
        type: string
      passive_repo:
        description: Passive dependency repository
        required: true
        type: string
      passive_pr_number:
        description: Passive dependency pull request number
        required: true
        type: string
      passive_sha:
        description: Passive dependency commit SHA
        required: true
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  EXTRA_TAG: ${{ github.event_name == 'push' && 'latest' || (github.event_name == 'pull_request' && format('pr-{0}', github.event.number) || '') }}

jobs:
  type-check:
    if: github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npx tsc --noEmit

  build:
    if: github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    needs: [type-check]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npm run build

  docker:
    if: github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4
      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.EXTRA_TAG }}

  trigger-integration:
    runs-on: ubuntu-latest
    if: always()
    needs: [docker]
    steps:
      - name: Parse dependency and dispatch
        run: |
          ##############################
          # PUSH TO MAIN — skip dispatch
          ##############################
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "Push to main: E2E already validated on PR"
            exit 0
          fi

          ###############################################
          # WORKFLOW_DISPATCH — wakeup from passive PR
          ###############################################
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            PR_NUM="${{ inputs.pr_number }}"
            PR_SHA="${{ inputs.pr_head_sha }}"
            PASSIVE_REPO="${{ inputs.passive_repo }}"
            PASSIVE_PR="${{ inputs.passive_pr_number }}"
            PASSIVE_SHA="${{ inputs.passive_sha }}"

            echo "Wakeup received from $PASSIVE_REPO PR #$PASSIVE_PR for active PR #$PR_NUM"
            if ! [[ "$PASSIVE_PR" =~ ^[0-9]+$ ]]; then
              echo "Invalid passive pull request number — nothing to do"
              exit 0
            fi

            DEP_REPO="$PASSIVE_REPO"
            DEP_PR="$PASSIVE_PR"

            GHCR_TOKEN=$(curl -s "https://ghcr.io/token?service=ghcr.io&scope=repository:$DEP_REPO:pull" \
              -u "oauth2:${{ secrets.GH_PAT }}" | jq -r '.token')
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
              -H "Authorization: Bearer $GHCR_TOKEN" \
              "https://ghcr.io/v2/$DEP_REPO/manifests/pr-$DEP_PR")

            if [ "$HTTP_CODE" != "200" ]; then
              echo "Dependency PR #$DEP_PR image not ready yet — nothing to do"
              exit 0
            fi

            echo "Dependency ready — dispatching E2E with $PASSIVE_REPO"
            FRONTEND_TAG="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:pr-$PR_NUM"
            BACKEND_TAG="ghcr.io/$DEP_REPO:pr-$DEP_PR"
            UPSTREAMS="[{\"repo\":\"${{ github.repository }}\",\"sha\":\"$PR_SHA\"},{\"repo\":\"$PASSIVE_REPO\",\"sha\":\"$PASSIVE_SHA\"}]"

            gh api repos/${{ github.repository_owner }}/e2e-flowts-lab/dispatches \
              -f event_type=integration-tests \
              -f "client_payload[frontend_image]=$FRONTEND_TAG" \
              -f "client_payload[backend_image]=$BACKEND_TAG" \
              -f "client_payload[upstreams]=$UPSTREAMS"
            exit 0
          fi

          ##############################
          # PULL REQUEST — default flow
          ##############################
          PR_URL="repos/${{ github.repository }}/pulls/${{ github.event.number }}"
          PR_BODY=$(gh api "$PR_URL" --jq '.body' 2>/dev/null || echo "")
          DEP=$(echo "$PR_BODY" | grep -E '^cross-repo-dependency:' | sed 's/^cross-repo-dependency: *//' | head -1)
          ROLE=$(printf '%s\n' "$PR_BODY" | sed 's/^[[:space:]]*//' | awk -F': ' '/^role:/{print $2; exit}')
          DEP_PROJECT=$(printf '%s\n' "$PR_BODY" | sed 's/^[[:space:]]*//' | awk -F': ' '/^dependency_project:/{print $2; exit}')
          DEP_BRANCH=$(printf '%s\n' "$PR_BODY" | sed 's/^[[:space:]]*//' | awk -F': ' '/^dependency_branch:/{print $2; exit}')
          COORD_PROJECT=$(printf '%s\n' "$PR_BODY" | sed 's/^[[:space:]]*//' | awk -F': ' '/^coordinator_project:/{print $2; exit}')
          COORD_BRANCH=$(printf '%s\n' "$PR_BODY" | sed 's/^[[:space:]]*//' | awk -F': ' '/^coordinator_branch:/{print $2; exit}')
          if [ "$ROLE" = "active" ] && [ -n "$DEP_PROJECT" ] && [ -n "$DEP_BRANCH" ]; then
            DEP="$DEP_PROJECT/branch:$DEP_BRANCH"
          elif [ "$ROLE" = "passive" ] && [ -n "$COORD_PROJECT" ] && [ -n "$COORD_BRANCH" ]; then
            DEP="wait_for:$COORD_PROJECT/branch:$COORD_BRANCH"
          fi

          # wait_for: passive — wakeup the active PR
          if [[ "$DEP" = wait_for:* ]]; then
            WAIT_TARGET="${DEP#wait_for:}"
            WAIT_REPO=$(echo "$WAIT_TARGET" | cut -d'/' -f1-2)
            WAIT_PR=$(echo "$WAIT_TARGET" | cut -d'/' -f3)

            # If wait_for target uses branch: format, resolve it
            if echo "$WAIT_TARGET" | grep -qE '^[^/]+/[^/]+/branch:'; then
              RESOLVED=$(resolve_branch "$WAIT_TARGET")
              if [ -n "$RESOLVED" ]; then
                WAIT_REPO=$(echo "$RESOLVED" | cut -d'/' -f1-2)
                WAIT_PR=$(echo "$RESOLVED" | cut -d'/' -f3)
                echo "Resolved wait_for branch to $WAIT_REPO PR #$WAIT_PR"
              fi
            fi

            echo "wait_for: $WAIT_TARGET — setting pending and sending wakeup"
            gh api repos/${{ github.repository }}/statuses/${{ github.event.pull_request.head.sha }} \
              -f state=pending \
              -f context=e2e/integration \
              -f "description=Waiting for $WAIT_TARGET to trigger E2E"

            WAIT_SHA=$(gh api "repos/$WAIT_REPO/pulls/$WAIT_PR" --jq '.head.sha' 2>/dev/null || echo "")
            if [ -n "$WAIT_SHA" ]; then
              gh api repos/$WAIT_REPO/dispatches \
                -f event_type=cross-repo-wakeup \
                -f "client_payload[pr_number]=$WAIT_PR" \
                -f "client_payload[pr_head_sha]=$WAIT_SHA" \
                -f "client_payload[passive_repo]=${{ github.repository }}" \
                -f "client_payload[passive_sha]=${{ github.event.pull_request.head.sha }}"
              echo "Wakeup sent to $WAIT_REPO PR #$WAIT_PR"
            fi
            exit 0
          fi

          # Resolve branch: format in active dependency
          if echo "$DEP" | grep -qE '^[^/]+/[^/]+/branch:'; then
            RESOLVED=$(resolve_branch "$DEP")
            if [ -n "$RESOLVED" ]; then
              echo "Resolved branch dependency to $RESOLVED"
              DEP="$RESOLVED"
            else
              echo "Branch dependency not yet resolvable — no open PR for this branch"
              gh api repos/${{ github.repository }}/statuses/${{ github.event.pull_request.head.sha }} \
                -f state=pending \
                -f context=e2e/integration \
                -f "description=Waiting for dependency branch PR to open"
              exit 0
            fi
          fi

          # Validate dependency format
          if [ -n "$DEP" ]; then
            DEP_REPO=$(echo "$DEP" | cut -d'/' -f1-2)
            DEP_PR=$(echo "$DEP" | cut -d'/' -f3)
            DEP_COUNT=$(echo "$DEP" | awk -F'/' '{print NF}')
            if [ "$DEP_COUNT" -ne 3 ] || [ -z "$DEP_REPO" ] || [ -z "$DEP_PR" ]; then
              echo "Invalid dependency format: $DEP — dispatching normally"
              DEP=""
            elif [ -z "$(echo "$DEP_PR" | grep -E '^[0-9]+$')" ]; then
              echo "Invalid PR number: $DEP — dispatching normally"
              DEP=""
            fi
          fi

          # No dependency — single upstream dispatch
          if [ -z "$DEP" ]; then
            PR_SHA="${{ github.event.pull_request.head.sha }}"
            UPSTREAMS="[{\"repo\":\"${{ github.repository }}\",\"sha\":\"$PR_SHA\"}]"
            FRONTEND_TAG="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"
            BACKEND_TAG="${{ env.REGISTRY }}/${{ github.repository_owner }}/backend-lab:latest"

            gh api repos/${{ github.repository_owner }}/e2e-flowts-lab/dispatches \
              -f event_type=integration-tests \
              -f "client_payload[frontend_image]=$FRONTEND_TAG" \
              -f "client_payload[backend_image]=$BACKEND_TAG" \
              -f "client_payload[upstreams]=$UPSTREAMS"
            exit 0
          fi

          # Active dependency — check image and dispatch once
          DEP_SHA=$(gh api "repos/$DEP_REPO/pulls/$DEP_PR" --jq '.head.sha' 2>/dev/null || echo "")

          if [ -z "$DEP_SHA" ]; then
            echo "Could not resolve dependency: $DEP"
            gh api repos/${{ github.repository }}/statuses/${{ github.event.pull_request.head.sha }} \
              -f state=pending \
              -f context=e2e/integration \
              -f "description=Waiting for dependency: $DEP"
            exit 0
          fi

          GHCR_TOKEN=$(curl -s "https://ghcr.io/token?service=ghcr.io&scope=repository:$DEP_REPO:pull" \
            -u "oauth2:${{ secrets.GH_PAT }}" | jq -r '.token')
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer $GHCR_TOKEN" \
            "https://ghcr.io/v2/$DEP_REPO/manifests/pr-$DEP_PR")

          if [ "$HTTP_CODE" != "200" ]; then
            echo "Dependency $DEP_REPO PR #$DEP_PR image not ready yet"
            gh api repos/${{ github.repository }}/statuses/${{ github.event.pull_request.head.sha }} \
              -f state=pending \
              -f context=e2e/integration \
              -f "description=Waiting for dependency: $DEP"
            exit 0
          fi

          echo "Cross-repo: testing with $DEP_REPO PR #$DEP_PR"
          PR_SHA="${{ github.event.pull_request.head.sha }}"
          FRONTEND_TAG="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"
          BACKEND_TAG="ghcr.io/$DEP_REPO:pr-$DEP_PR"
          UPSTREAMS="[{\"repo\":\"${{ github.repository }}\",\"sha\":\"$PR_SHA\"},{\"repo\":\"$DEP_REPO\",\"sha\":\"$DEP_SHA\"}]"

          gh api repos/${{ github.repository_owner }}/e2e-flowts-lab/dispatches \
            -f event_type=integration-tests \
            -f "client_payload[frontend_image]=$FRONTEND_TAG" \
            -f "client_payload[backend_image]=$BACKEND_TAG" \
            -f "client_payload[upstreams]=$UPSTREAMS"
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
